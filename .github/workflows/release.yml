name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-legacy-mods:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Fabric 1.19 and 1.21.11 mods
        working-directory: mod
        run: ./gradlew :fabric-1.19:build :fabric-1.21.11:build --no-daemon

      - name: Upload 1.19 release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-fabric-1.19
          path: mod/fabric-1.19/build/libs/*.jar
          if-no-files-found: error

      - name: Upload 1.21.11 release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-fabric-1.21.11
          path: mod/fabric-1.21.11/build/libs/*.jar
          if-no-files-found: error

  build-26-2-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Fabric 26.2 dev mod
        working-directory: mod
        run: ./gradlew :fabric-26.2-dev:build --no-daemon

      - name: Upload 26.2 release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-fabric-26.2-dev
          path: mod/fabric-26.2-dev/build/libs/*.jar
          if-no-files-found: error

  build-and-release:
    needs:
      - build-legacy-mods
      - build-26-2-dev
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download 1.19 artifact
        uses: actions/download-artifact@v8
        with:
          name: release-fabric-1.19
          path: release-artifacts/fabric-1.19

      - name: Download 1.21.11 artifact
        uses: actions/download-artifact@v8
        with:
          name: release-fabric-1.21.11
          path: release-artifacts/fabric-1.21.11

      - name: Download 26.2 artifact
        uses: actions/download-artifact@v8
        with:
          name: release-fabric-26.2-dev
          path: release-artifacts/fabric-26.2-dev

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: DebugBridge v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            release-artifacts/fabric-1.19/*.jar
            release-artifacts/fabric-1.21.11/*.jar
            release-artifacts/fabric-26.2-dev/*.jar
          body: |
            ## DebugBridge v${{ steps.version.outputs.VERSION }}

            Lua-Java bridge for Minecraft: a WebSocket REPL into the running client.

            ### Installation
            1. Install Fabric Loader for your Minecraft version
            2. Drop the appropriate JAR into your `mods` folder
            3. Launch the game - you'll see a developer warning on first run

            ### Supported Versions
            - Minecraft 1.19 (Fabric Loader >= 0.14.0)
            - Minecraft 1.21.11 (Fabric Loader >= 0.16.0)
            - Minecraft 26.2 development snapshots (Fabric Loader >= 0.19.2)
